# Kafka
kafka.bootstrap.servers=localhost:9092
kafka.topic.raw-clicks=raw-clicks
kafka.topic.aggregated-clicks=aggregated-clicks
kafka.consumer.group=flink-click-aggregator

# Schema Registry
schema.registry.url=http://localhost:8081

# ClickHouse
clickhouse.url=jdbc:ch://localhost:8123/clickagg
clickhouse.user=clickagg
clickhouse.password=clickagg

# Window settings
window.size.minutes=1
allowed.lateness.seconds=30

# Checkpointing (ms)
checkpoint.interval.ms=30000
